backend:
  name: git-gateway
  branch: main
  repo: homesrigz/roundoff

media_library:
  name: cloudinary
  config:
    cloud_name: "homerigz"
    api_key: "547679675493895"

collections:
  - name: "house_listings"
    label: "House Listings"
    folder: ""
    files:
      - file: "HOMELINK-JS/houselisting.json"
        label: "House Listings"
        name: "listings"
        fields:
          - label: "Listings"
            name: "listings"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Price", name: "price", widget: "number"}
              - {label: "Location", name: "location", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - {label: "Image", name: "image", widget: "image"}
              - {label: "Bedrooms", name: "bedrooms", widget: "number"}
              - {label: "Bathrooms", name: "bathrooms", widget: "number"}
              - {label: "Square Feet", name: "sqft", widget: "number"}

